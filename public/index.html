<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="description" content="Zap - 闪电般快速的待办事项应用" />
    <title>Zap</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #f5f5f5;
        display: flex;
        flex-direction: column;
      }

      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #0d7c66 0%, #40c4a8 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      .loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loading-logo {
        width: 80px;
        height: 80px;
        background: rgba(255,255,255,0.2);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        animation: pulse 2s ease-in-out infinite;
      }
      .loading-logo svg {
        width: 48px;
        height: 48px;
        stroke: white;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .loading-text {
        color: white;
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 24px;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }

      .app-wrapper {
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
      }

      .custom-titlebar {
        height: 32px;
        background: #dbebe8;
        display: none;
        align-items: center;
        justify-content: space-between;
        -webkit-app-region: drag;
        user-select: none;
        flex-shrink: 0;
      }

      body.electron-mode .custom-titlebar {
        display: flex;
      }

      body.electron-mode #root {
        height: calc(100% - 32px);
      }

      .titlebar-title {
        color: #1A1A2E;
        font-size: 13px;
        font-weight: 600;
        padding-left: 12px;
        letter-spacing: 1px;
      }

      .titlebar-controls {
        display: flex;
        height: 100%;
        -webkit-app-region: no-drag;
      }

      .titlebar-btn {
        width: 46px;
        height: 100%;
        border: none;
        background: transparent;
        color: #888888;
        font-size: 11px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.15s ease;
      }

      .titlebar-btn:hover {
        background-color: rgba(0, 0, 0, 0.08);
        color: #1A1A2E;
      }

      .titlebar-btn.close:hover {
        background-color: #FF4D4D;
        color: white;
      }

      .titlebar-btn svg {
        width: 10px;
        height: 10px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      .titlebar-btn.maximize svg.maximize {
        width: 11px;
        height: 11px;
      }

      .titlebar-btn.maximize svg.restore {
        display: none;
      }

      .titlebar-btn.maximize.maximized svg.maximize {
        display: none;
      }

      .titlebar-btn.maximize.maximized svg.restore {
        display: block;
        width: 11px;
        height: 11px;
      }

      #root {
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <noscript>您需要启用 JavaScript 才能运行此应用。</noscript>
    
    <div id="loading-screen" class="loading-screen">
      <div class="loading-logo">
        <svg viewBox="0 0 24 24">
          <polyline points="9 11 12 14 22 4"></polyline>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
      </div>
      <div class="loading-text">ZAP</div>
      <div class="loading-spinner"></div>
    </div>

    <script>
      if (window.electronAPI) {
        document.body.classList.add('electron-mode');
      }
    </script>

    <div class="app-wrapper">
      <div class="custom-titlebar">
        <span class="titlebar-title">ZAP</span>
        <div class="titlebar-controls">
          <button class="titlebar-btn minimize" id="btn-minimize" title="最小化">
            <svg viewBox="0 0 10 10">
              <line x1="0" y1="5" x2="10" y2="5"></line>
            </svg>
          </button>
          <button class="titlebar-btn maximize" id="btn-maximize" title="最大化">
            <svg class="maximize" viewBox="0 0 10 10">
              <rect x="0.5" y="0.5" width="9" height="9" rx="1" fill="none" stroke="currentColor"></rect>
            </svg>
            <svg class="restore" viewBox="0 0 10 10">
              <rect x="2.5" y="0.5" width="7" height="7" rx="1" fill="none" stroke="currentColor"></rect>
              <path d="M0.5 2.5 L0.5 9.5 L7.5 9.5 L7.5 7.5" fill="none" stroke="currentColor"></path>
            </svg>
          </button>
          <button class="titlebar-btn close" id="btn-close" title="关闭">
            <svg viewBox="0 0 10 10">
              <line x1="0" y1="0" x2="10" y2="10"></line>
              <line x1="10" y1="0" x2="0" y2="10"></line>
            </svg>
          </button>
        </div>
      </div>

      <div id="root"></div>
    </div>

    <div id="icon-cache" style="display:none;position:absolute;top:-9999px;left:-9999px;">
      <svg xmlns="http://www.w3.org/2000/svg" id="lucide-icons" style="display:none;"></svg>
    </div>

    <script>
      window.hideLoading = function() {
        var loading = document.getElementById('loading-screen');
        if (loading) {
          loading.classList.add('hidden');
          setTimeout(function() {
            loading.style.display = 'none';
          }, 500);
        }
      };
      
      setTimeout(function() {
        window.hideLoading();
      }, 5000);

      if (window.electronAPI) {
        document.getElementById('btn-minimize').addEventListener('click', function() {
          window.electronAPI.minimizeApp();
        });

        document.getElementById('btn-maximize').addEventListener('click', function() {
          window.electronAPI.maximizeApp();
        });

        document.getElementById('btn-close').addEventListener('click', function() {
          window.electronAPI.closeApp();
        });

        function updateMaximizeButton(isMaximized) {
          var btn = document.getElementById('btn-maximize');
          if (isMaximized) {
            btn.classList.add('maximized');
          } else {
            btn.classList.remove('maximized');
          }
        }

        window.electronAPI.onWindowMaximized(function(isMaximized) {
          updateMaximizeButton(isMaximized);
        });

        window.electronAPI.getWindowMaximized().then(function(isMaximized) {
          updateMaximizeButton(isMaximized);
        });
      }
    </script>
  </body>
</html>
